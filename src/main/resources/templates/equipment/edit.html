<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Редактирование оборудования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Service Desk</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Дашборд</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/requests">Заявки</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')" class="nav-item">
                    <a class="nav-link active" href="/equipment">Оборудование</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')" class="nav-item">
                    <a class="nav-link" href="/materials">Материалы</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                    <a class="nav-link" href="/users">Пользователи</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/reports">Отчёты</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')" class="nav-item">
                    <a class="nav-link" href="/dispatcher/notifications">Уведомления</a>
                </li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fas fa-user"></i> <span sec:authentication="name"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/users/profile">Профиль</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item">Выйти</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning">
                    <h3 class="mb-0">Редактирование оборудования</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/equipment/edit/{id}(id=${equipment.equipmentId})}"
                          th:object="${equipment}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Наименование *</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Тип оборудования</label>
                            <select th:field="*{type.typeId}" class="form-select">
                                <option value="">-- Выберите тип --</option>
                                <option th:each="type : ${types}" th:value="${type.typeId}" th:text="${type.name}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Местоположение</label>
                                    <input type="text" th:field="*{location}" class="form-control">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Дата ввода в эксплуатацию</label>
                                    <input type="date" th:field="*{installDate}" class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Периодичность плановых работ (дни)</label>
                            <input type="number" th:field="*{intervalDays}" class="form-control" min="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Дата последнего обслуживания</label>
                            <input type="date" th:field="*{lastMaint}" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a href="/equipment" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
