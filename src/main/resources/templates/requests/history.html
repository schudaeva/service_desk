<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>История статусов - Заявка №[[${request.requestId}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Service Desk</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Дашборд</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/requests">Заявки</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')" class="nav-item">
                    <a class="nav-link" href="/equipment">Оборудование</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')" class="nav-item">
                    <a class="nav-link" href="/materials">Материалы</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                    <a class="nav-link" href="/users">Пользователи</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/reports">Отчёты</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')" class="nav-item">
                    <a class="nav-link" href="/dispatcher/notifications">Уведомления</a>
                </li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fas fa-user"></i> <span sec:authentication="name"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/users/profile">Профиль</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item">Выйти</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1>История статусов заявки №<span th:text="${request.requestId}"></span></h1>
    <p class="lead" th:text="${request.title}">Заголовок</p>

    <div class="card">
        <div class="card-header bg-info text-white">
            <i class="fas fa-history me-2"></i> Изменения статуса
        </div>
        <div class="card-body">
            <div th:if="${history == null or history.empty}" class="alert alert-info">
                История статусов пуста.
            </div>
            <table th:if="${history != null and not history.empty}" class="table table-striped">
                <thead>
                <tr><th>Дата и время</th><th>Статус</th><th>Пользователь</th></tr>
                </thead>
                <tbody>
                <tr th:each="h : ${history}">
                    <td th:text="${#temporals.format(h.changedAt, 'dd.MM.yyyy HH:mm:ss')}">-</td>
                    <td th:text="${h.status.name}">-</td>
                    <td th:text="${h.user.username}">-</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/requests/{id}(id=${request.requestId})}" class="btn btn-secondary">Назад к заявке</a>
    </div>
</div>
</body>
</html>
