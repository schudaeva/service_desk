<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Service Desk</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Дашборд</a></li>
                <li class="nav-item"><a class="nav-link active" href="/requests">Заявки</a></li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/equipment">Оборудование</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/materials">Материалы</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/users">Пользователи</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/admin/dictionaries">Справочники</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/reports">Отчёты</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/dispatcher/notifications">Уведомления</a>
                </li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fas fa-user"></i> <span sec:authentication="name"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/users/profile">Профиль</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item">Выйти</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h3 class="mb-0"><i class="fas fa-edit me-2"></i>Редактирование заявки №<span th:text="${requestId}"></span></h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/requests/edit/{id}(id=${requestId})}"
                          th:object="${requestCreateDto}" method="post" id="editForm">

                        <div class="mb-3">
                            <label class="form-label">Заголовок <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Оборудование</label>
                            <select th:field="*{equipmentId}" class="form-select">
                                <option value="">-- Не выбрано --</option>
                                <option th:each="e : ${equipmentList}"
                                        th:value="${e.equipmentId}"
                                        th:text="${e.name}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Исполнитель</label>
                            <select th:field="*{assignedToId}" class="form-select">
                                <option value="">-- Не назначен --</option>
                                <option th:each="w : ${workers}"
                                        th:value="${w.userId}"
                                        th:text="${w.username}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Приоритет</label>
                            <select th:field="*{priority}" class="form-select">
                                <option value="LOW">Низкий</option>
                                <option value="MEDIUM">Средний</option>
                                <option value="HIGH">Высокий</option>
                                <option value="CRITICAL">Критичный</option>
                            </select>
                        </div>

                        <div class="mb-3" sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                            <label class="form-label">Срок выполнения</label>
                            <input type="datetime-local"
                                   name="deadline"
                                   th:value="${requestCreateDto.formattedDeadline}"
                                   class="form-control">
                        </div>
                        <!-- Материалы -->
                        <div class="card mb-3">
                            <div class="card-header bg-secondary">
                                <i class="fas fa-boxes me-1"></i> Материалы
                            </div>
                            <div class="card-body">
                                <div id="materials-container">
                                    <div th:if="${requestCreateDto.materialIds == null or requestCreateDto.materialIds.isEmpty()}">
                                        <div class="row mb-2 material-row">
                                            <div class="col-md-5">
                                                <select name="materialIds" class="form-select">
                                                    <option value="">-- Выберите материал --</option>
                                                    <option th:each="m : ${materials}"
                                                            th:value="${m.materialId}"
                                                            th:text="${m.name + ' (остаток: ' + m.quantity + ' ' + m.unit + ')'}">
                                                    </option>
                                                </select>
                                            </div>
                                            <div class="col-md-3">
                                                <input type="number" name="plannedQuantities" class="form-control"
                                                       placeholder="Количество" min="1">
                                            </div>
                                            <div class="col-md-2">
                                                <button type="button" class="btn btn-danger remove-material" style="display: none;">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div th:if="${requestCreateDto.materialIds != null and not requestCreateDto.materialIds.isEmpty()}">
                                        <div th:each="mid, iterStat : ${requestCreateDto.materialIds}"
                                             class="row mb-2 material-row">
                                            <div class="col-md-5">
                                                <select name="materialIds" class="form-select">
                                                    <option value="">-- Выберите материал --</option>
                                                    <option th:each="m : ${materials}"
                                                            th:value="${m.materialId}"
                                                            th:text="${m.name + ' (остаток: ' + m.quantity + ' ' + m.unit + ')'}"
                                                            th:selected="${m.materialId == mid}">
                                                    </option>
                                                </select>
                                            </div>
                                            <div class="col-md-3">
                                                <input type="number" name="plannedQuantities" class="form-control"
                                                       placeholder="Количество" min="1"
                                                       th:value="${requestCreateDto.plannedQuantities[iterStat.index]}">
                                            </div>
                                            <div class="col-md-2">
                                                <button type="button" class="btn btn-danger remove-material"
                                                        th:style="${iterStat.index == 0 ? 'display: none;' : 'display: inline-block'}">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button type="button" id="add-material" class="btn btn-sm btn-secondary mt-2">
                                    <i class="fas fa-plus me-1"></i> Добавить материал
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Сохранить
                            </button>
                            <a th:href="@{/requests/{id}(id=${requestId})}" class="btn btn-secondary">Назад к заявке</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function addMaterialRow() {
        var container = document.getElementById('materials-container');
        var originalRow = container.querySelector('.material-row');

        if (!originalRow) return;

        var newRow = originalRow.cloneNode(true);

        // Очищаем значения
        var select = newRow.querySelector('select');
        if (select) select.value = '';

        var input = newRow.querySelector('input[type="number"]');
        if (input) input.value = '';

        // Показываем и настраиваем кнопку удаления
        var removeBtn = newRow.querySelector('.remove-material');
        if (removeBtn) {
            removeBtn.style.display = 'inline-block';
            var newRemoveBtn = removeBtn.cloneNode(true);
            removeBtn.parentNode.replaceChild(newRemoveBtn, removeBtn);
            newRemoveBtn.onclick = function() {
                this.closest('.material-row').remove();
            };
        }

        container.appendChild(newRow);
    }

    // Настраиваем кнопку добавления
    var addBtn = document.getElementById('add-material');
    if (addBtn) {
        var newAddBtn = addBtn.cloneNode(true);
        addBtn.parentNode.replaceChild(newAddBtn, addBtn);
        newAddBtn.onclick = addMaterialRow;
    }

    // Настраиваем существующие кнопки удаления
    var removeBtns = document.querySelectorAll('.remove-material');
    for (var i = 0; i < removeBtns.length; i++) {
        var btn = removeBtns[i];
        if (btn.style.display !== 'inline-block') {
            btn.style.display = 'inline-block';
        }
        var newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.onclick = function() {
            this.closest('.material-row').remove();
        };
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
