<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Редактирование статуса</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Service Desk</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Дашборд</a></li>
                <li class="nav-item"><a class="nav-link" href="/requests">Заявки</a></li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/equipment">Оборудование</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/materials">Материалы</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/users">Пользователи</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/admin/dictionaries">Справочники</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/reports">Отчёты</a>
                </li>
                <li sec:authorize="hasAnyRole('ADMIN', 'DISPATCHER')">
                    <a class="nav-link" href="/dispatcher/notifications">Уведомления</a>
                </li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fas fa-user"></i> <span sec:authentication="name"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/users/profile">Профиль</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item">Выйти</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-warning">
                    <h3 class="mb-0">Редактирование статуса заявки</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/dictionaries/statuses/edit/{id}(id=${status.statusId})}"
                          th:object="${status}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Кодовое обозначение</label>
                            <input type="text" th:field="*{code}" class="form-control" required>
                            <small class="text-muted">Например: WAITING_MATERIALS, ON_HOLD</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Цвет</label>
                            <input type="color" th:field="*{color}" class="form-control" style="height: 50px;">
                            <small class="text-muted">Выберите цвет для визуального выделения</small>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" th:field="*{isFinal}" class="form-check-input">
                            <label class="form-check-label">Конечный статус (заявка завершена)</label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Порядок сортировки</label>
                            <input type="number" th:field="*{sortOrder}" class="form-control">
                            <small class="text-muted">Чем меньше число, тем выше в списке</small>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" th:field="*{isActive}" class="form-check-input">
                            <label class="form-check-label">Активен</label>
                        </div>
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Сохранить
                            </button>
                            <a href="/admin/dictionaries" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
